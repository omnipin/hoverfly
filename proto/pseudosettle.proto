// Bee pseudosettle protocol — time-based credit refreshment.
// /swarm/pseudosettle/1.0.0/pseudosettle
//
// Client opens stream, sends Payment, reads PaymentAck. The peer accepts
// up to `(now - last_payment_timestamp) * refresh_rate` PLUR per call,
// bounded by our actual debt with that peer.

syntax = "proto3";

package pseudosettle;

message Payment {
  bytes Amount = 1;
}

message PaymentAck {
  bytes Amount = 1;
  int64 Timestamp = 2;
}
