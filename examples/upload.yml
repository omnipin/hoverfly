# Example: upload a directory to Swarm as a TAR collection at max
# throughput via the warm-pool daemon.
#
# Drop this into `.github/workflows/upload.yml` in your project. It
# starts an hoverfly daemon, waits for its session pool to warm,
# uploads `./dist` packed as a tar, and prints the manifest root.
#
# Required repo secrets:
#   SWARM_KEY    Postage batch owner's signer (hex, 32 bytes, 0x optional)
#   SWARM_BATCH  Postage batch ID (hex, 32 bytes)
#   SWARM_NONCE  Overlay nonce (hex, 32 bytes). Generate once with
#                `hoverfly vanity-overlay --key $SWARM_KEY` and treat
#                like an identity secret — see hoverfly README.

name: upload

on:
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Fetch hoverfly
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Grab the most recent release's Linux x86_64 tarball. The
          # tarball bundles the binary, peers.seed.json, README, and LICENSE.
          gh release download -R omnipin/hoverfly \
            -p 'hoverfly-*-x86_64-unknown-linux-gnu.tar.gz'
          tar -xzf hoverfly-*-x86_64-unknown-linux-gnu.tar.gz --strip-components=1
          mv peers.seed.json peers.json
          printf "%s" "${{ secrets.SWARM_NONCE }}" > overlay-nonce

      - name: Start daemon
        run: |
          nohup ./hoverfly daemon \
            --socket /tmp/hoverfly.sock \
            --pool-size 256 \
            --listen /ip4/0.0.0.0/tcp/1635 \
            --identity "${{ secrets.SWARM_KEY }}" \
            --discover-rounds 3 \
            > /tmp/daemon.log 2>&1 &

      - name: Wait for warm pool
        run: |
          for i in $(seq 1 96); do
            grep -q "warm pool" /tmp/daemon.log && exit 0
            sleep 5
          done
          echo "::warning::pool did not warm in 8 min; proceeding anyway"

      - name: Pack and upload
        env:
          SWARM_KEY: ${{ secrets.SWARM_KEY }}
          SWARM_BATCH: ${{ secrets.SWARM_BATCH }}
        run: |
          tar -cf dist.tar -C dist .
          ./hoverfly upload \
            --daemon /tmp/hoverfly.sock \
            --batch "$SWARM_BATCH" \
            --key "$SWARM_KEY" \
            dist.tar
