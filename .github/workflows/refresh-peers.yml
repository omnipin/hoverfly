name: refresh-peers

# Periodically rebuild peers.seed.json by running `hoverfly discover`
# against the mainnet bootnode for several recursive rounds, with a
# reachability healthcheck so the dial-cache fields (last_dial_*,
# consecutive_failures) are populated. Discovered peers whose underlays
# are all unroutable (RFC1918/CGNAT/loopback) are already stripped by
# `discover` itself; the healthcheck annotates (does NOT drop) the rest.
#
# Also derives peers.ws.json — the browser-dialable (ws/wss-underlay)
# subset of the same harvest — which the gateway serves as its cold-start
# seed via the apps/gateway/public/__gw__/peers.ws.json symlink.

on:
  schedule:
    # Hourly. Mainnet /ws peers go stale within ~2-3 hours (AutoTLS SNI
    # addresses rotate, nodes churn), so a 5-hour cadence often left the
    # committed cold-start seed stale by the time a fresh visitor dialed it.
    # Refreshing every hour keeps the seed well inside the staleness window.
    # Cheap: a run is a few minutes, `concurrency` serialises overlapping
    # runs, and `[skip ci]` commits don't trigger other workflows.
    - cron: "0 * * * *"
  # Allow manual runs from the Actions tab.
  workflow_dispatch:
    inputs:
      rounds:
        description: "Number of recursive discovery hops"
        required: false
        default: "5"
      discover_concurrency:
        description: "Peers dialed in parallel per round"
        required: false
        default: "256"

# Only one refresh at a time; cancel an in-flight run if a newer one starts.
concurrency:
  group: refresh-peers
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    # Discover (5 rounds) + healthcheck against thousands of peers can run
    # a while; cap generously so a slow network round doesn't hang forever.
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download latest hoverfly release binary
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET: x86_64-unknown-linux-gnu
        run: |
          set -euo pipefail
          # Resolve the latest (non-draft, non-prerelease) release tag.
          tag="$(gh release view --repo "${{ github.repository }}" --json tagName -q .tagName)"
          echo "Latest release: $tag"
          asset="hoverfly-${tag}-${TARGET}.tar.gz"
          echo "Fetching asset: $asset"
          gh release download "$tag" \
            --repo "${{ github.repository }}" \
            --pattern "$asset" \
            --pattern "${asset}.sha256" \
            --clobber
          # Verify checksum (the .sha256 references the bare filename).
          sha256sum -c "${asset}.sha256"
          # Extract; the tarball wraps the binary in a dir named after the
          # full target triple. Pull the `hoverfly` binary out regardless of
          # the wrapping directory name.
          tar -xzf "$asset"
          bin_path="$(find . -type f -name hoverfly -perm -u+x | head -n1)"
          if [ -z "$bin_path" ]; then
            # Fallback for tarballs that don't preserve the +x bit.
            bin_path="$(find . -type f -name hoverfly | head -n1)"
          fi
          install -m 0755 "$bin_path" /usr/local/bin/hoverfly
          hoverfly --version

      - name: Run discover (5 rounds, with healthcheck)
        env:
          ROUNDS: ${{ github.event.inputs.rounds || '5' }}
          DISCOVER_CONCURRENCY: ${{ github.event.inputs.discover_concurrency || '256' }}
        run: |
          set -euo pipefail
          # Write to a temp file so a failed/partial run never clobbers the
          # committed seed. `--healthcheck` populates the reachability cache
          # (last_dial_success_unix / last_dial_failure_unix / rtt / failures)
          # but keeps every peer in the list (annotate, not drop).
          hoverfly discover \
            --output peers.seed.next.json \
            --rounds "$ROUNDS" \
            --discover-concurrency "$DISCOVER_CONCURRENCY" \
            --healthcheck

          # Sanity: the run must have produced a non-trivial peerlist before
          # we replace the committed file. Bail (without committing) if the
          # network round came back nearly empty — better to keep the old
          # seed than to commit a degenerate one.
          count="$(python3 -c 'import json,sys; print(len(json.load(open("peers.seed.next.json")).get("peers",{})))')"
          echo "Discovered peer count: $count"
          if [ "$count" -lt 500 ]; then
            echo "::warning::Only $count peers discovered (<500); keeping existing seed and exiting without commit."
            exit 0
          fi
          mv -f peers.seed.next.json peers.seed.json

      - name: Derive peers.ws.json (browser-dialable subset)
        run: |
          set -euo pipefail
          # Skip if the discover step bailed early (peers.seed.json unchanged).
          if [ -f peers.seed.next.json ]; then
            echo "Discover bailed; keeping existing peers.ws.json."
            exit 0
          fi
          # peers.ws.json is the browser cold-start seed (served by the gateway
          # and the upload dApp). Browsers can only dial WebSocket (no raw TCP),
          # so this is the /ws[s] subset of the harvest — but two extra filters
          # are ESSENTIAL, learned the hard way:
          #
          #  1. REACHABILITY. The `--healthcheck` step dialed every peer and
          #     recorded the outcome. Mainnet /wss is scarce and flaky (AutoTLS
          #     SNI hostnames rotate every ~2-3h), so the raw ws subset is
          #     mostly DEAD underlays. Keeping them shipped a browser seed where
          #     ~90% of dials fail (`Firefox can't establish a connection`),
          #     starving the upload pool. Keep ONLY peers the healthcheck just
          #     reached: `last_dial_success_unix` set AND no newer failure.
          #
          #  2. UNIQUE IP. A handful of operators run many bee nodes on ONE
          #     host (e.g. 3 Hetzner IPs accounted for 93% of a prior ws seed,
          #     each with dozens of rotated SNI overlays). Keeping many overlays
          #     per host is actively HARMFUL in the browser: Firefox's
          #     `network.websocket.delay-failed-reconnects` throttles (and
          #     largely serializes) reconnects to the same host:port after any
          #     failed WS attempt, with exponential backoff. So dialing 100
          #     overlays behind 3 IPs isn't 100 parallel dials — it's 3 hosts'
          #     worth of backoff-delayed, serialized attempts, which is exactly
          #     the slow "can't establish a connection" trickle observed. Keep
          #     exactly ONE overlay per /32 so the browser dials distinct hosts
          #     in parallel and one host's failures never penalize another's
          #     dials. (The TCP seed — peers.seed.json — is NOT deduped: raw TCP
          #     has no per-host browser backoff and native benefits from the
          #     redundancy.)
          #
          # Dial-cache annotations ARE preserved (last_dial_*): the browser
          # ranks known-good peers first, and hourly timestamp churn in the
          # committed file is fine (`[skip ci]` keeps it from triggering other
          # workflows).
          python3 - <<'EOF'
          import json, re, collections

          # Exactly ONE overlay per /32 IPv4 (one physical host / operator):
          # avoids Firefox's per-host failed-reconnect backoff (see above).
          PER_IP_CAP = 1

          seed = json.load(open("peers.seed.json"))

          def ipv4(underlays):
              for u in underlays:
                  m = re.search(r"/ip4/([0-9.]+)/", u)
                  if m:
                      return m.group(1)
              return None

          def reachable(p):
              # Healthcheck-verified alive: a success on record, and no failure
              # that is newer than that success.
              s = p.get("last_dial_success_unix")
              f = p.get("last_dial_failure_unix")
              if not s:
                  return False
              if f and f > s:
                  return False
              return True

          # Collect reachable ws peers, best-RTT first so the per-IP cap keeps
          # the fastest overlays of each host rather than an arbitrary slice.
          cand = []
          ws_total = 0
          for overlay, p in seed["peers"].items():
              ws = [u for u in p["underlays"] if "/ws" in u]
              if not ws:
                  continue
              ws_total += 1
              if not reachable(p):
                  continue
              rtt = p.get("last_dial_rtt_ms")
              rtt = rtt if isinstance(rtt, int) else 1 << 30
              cand.append((rtt, overlay, p, ws))
          cand.sort(key=lambda t: t[0])

          out = {}
          per_ip = collections.Counter()
          for rtt, overlay, p, ws in cand:
              ip = ipv4(ws) or "?"
              if per_ip[ip] >= PER_IP_CAP:
                  continue
              per_ip[ip] += 1
              out[overlay] = {
                  "overlay": p["overlay"],
                  "underlays": ws,
                  "eth_address": p.get("eth_address"),
                  "nonce": p.get("nonce"),
                  # Preserve reachability so the browser prioritizes known-good.
                  "last_dial_success_unix": p.get("last_dial_success_unix"),
                  "last_dial_failure_unix": p.get("last_dial_failure_unix"),
                  "last_dial_rtt_ms": p.get("last_dial_rtt_ms"),
                  "consecutive_failures": p.get("consecutive_failures", 0),
              }
          count = len(out)  # == number of distinct reachable /wss hosts (1/IP)
          print(f"ws seed: {ws_total} ws peers in harvest, "
                f"{len(cand)} reachable, kept {count} unique-IP host(s)")
          # Sanity gate. With one overlay per IP, `count` IS the number of
          # distinct reachable /wss hosts on mainnet — genuinely scarce (only a
          # handful of operators enable AutoTLS). A degenerate seed is worse
          # than a slightly stale one, so keep the committed file if fewer than
          # 3 hosts came back. If this trips repeatedly, mainnet /wss host
          # availability itself is the bottleneck, not this workflow.
          if count < 3:
              print(f"::warning::Only {count} reachable /wss host(s) (<3); "
                    f"keeping existing peers.ws.json.")
              raise SystemExit(0)
          with open("peers.ws.json", "w") as f:
              json.dump({"peers": out}, f, indent=2)
              f.write("\n")
          EOF

      - name: Commit refreshed peerlists
        run: |
          set -euo pipefail
          # If the discover step bailed early the temp file may still exist
          # and both peerlists are unchanged — `git diff` handles that.
          rm -f peers.seed.next.json
          if git diff --quiet -- peers.seed.json peers.ws.json; then
            echo "peerlists unchanged; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add peers.seed.json peers.ws.json
          git commit -m "chore(peers): refresh peers.seed.json + peers.ws.json [skip ci]"
          git push
