name: refresh-peers

# Periodically rebuild peers.seed.json by running `hoverfly discover`
# against the mainnet bootnode for several recursive rounds, with a
# reachability healthcheck so the dial-cache fields (last_dial_*,
# consecutive_failures) are populated. Discovered peers whose underlays
# are all unroutable (RFC1918/CGNAT/loopback) are already stripped by
# `discover` itself; the healthcheck annotates (does NOT drop) the rest.
#
# Also derives peers.ws.json — the browser-dialable (ws/wss-underlay)
# subset of the same harvest — which the gateway serves as its cold-start
# seed via the apps/gateway/public/__gw__/peers.ws.json symlink.

on:
  schedule:
    # Hourly. Mainnet /ws peers go stale within ~2-3 hours (AutoTLS SNI
    # addresses rotate, nodes churn), so a 5-hour cadence often left the
    # committed cold-start seed stale by the time a fresh visitor dialed it.
    # Refreshing every hour keeps the seed well inside the staleness window.
    # Cheap: a run is a few minutes, `concurrency` serialises overlapping
    # runs, and `[skip ci]` commits don't trigger other workflows.
    - cron: "0 * * * *"
  # Allow manual runs from the Actions tab.
  workflow_dispatch:
    inputs:
      rounds:
        description: "Number of recursive discovery hops"
        required: false
        default: "5"
      discover_concurrency:
        description: "Peers dialed in parallel per round"
        required: false
        default: "256"

# Only one refresh at a time; cancel an in-flight run if a newer one starts.
concurrency:
  group: refresh-peers
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    # Discover (5 rounds) + healthcheck against thousands of peers can run
    # a while; cap generously so a slow network round doesn't hang forever.
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download latest hoverfly release binary
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET: x86_64-unknown-linux-gnu
        run: |
          set -euo pipefail
          # Resolve the latest (non-draft, non-prerelease) release tag.
          tag="$(gh release view --repo "${{ github.repository }}" --json tagName -q .tagName)"
          echo "Latest release: $tag"
          asset="hoverfly-${tag}-${TARGET}.tar.gz"
          echo "Fetching asset: $asset"
          gh release download "$tag" \
            --repo "${{ github.repository }}" \
            --pattern "$asset" \
            --pattern "${asset}.sha256" \
            --clobber
          # Verify checksum (the .sha256 references the bare filename).
          sha256sum -c "${asset}.sha256"
          # Extract; the tarball wraps the binary in a dir named after the
          # full target triple. Pull the `hoverfly` binary out regardless of
          # the wrapping directory name.
          tar -xzf "$asset"
          bin_path="$(find . -type f -name hoverfly -perm -u+x | head -n1)"
          if [ -z "$bin_path" ]; then
            # Fallback for tarballs that don't preserve the +x bit.
            bin_path="$(find . -type f -name hoverfly | head -n1)"
          fi
          install -m 0755 "$bin_path" /usr/local/bin/hoverfly
          hoverfly --version

      - name: Run discover (5 rounds, with healthcheck)
        env:
          ROUNDS: ${{ github.event.inputs.rounds || '5' }}
          DISCOVER_CONCURRENCY: ${{ github.event.inputs.discover_concurrency || '256' }}
        run: |
          set -euo pipefail
          # Write to a temp file so a failed/partial run never clobbers the
          # committed seed. `--healthcheck` populates the reachability cache
          # (last_dial_success_unix / last_dial_failure_unix / rtt / failures)
          # but keeps every peer in the list (annotate, not drop).
          hoverfly discover \
            --output peers.seed.next.json \
            --rounds "$ROUNDS" \
            --discover-concurrency "$DISCOVER_CONCURRENCY" \
            --healthcheck

          # Sanity: the run must have produced a non-trivial peerlist before
          # we replace the committed file. Bail (without committing) if the
          # network round came back nearly empty — better to keep the old
          # seed than to commit a degenerate one.
          count="$(python3 -c 'import json,sys; print(len(json.load(open("peers.seed.next.json")).get("peers",{})))')"
          echo "Discovered peer count: $count"
          if [ "$count" -lt 500 ]; then
            echo "::warning::Only $count peers discovered (<500); keeping existing seed and exiting without commit."
            exit 0
          fi
          mv -f peers.seed.next.json peers.seed.json

      - name: Derive peers.ws.json (browser-dialable subset)
        run: |
          set -euo pipefail
          # Skip if the discover step bailed early (peers.seed.json unchanged).
          if [ -f peers.seed.next.json ]; then
            echo "Discover bailed; keeping existing peers.ws.json."
            exit 0
          fi
          # peers.ws.json is the browser seed served by the gateway
          # (apps/gateway/public/__gw__/peers.ws.json symlinks here): keep
          # only peers with a /ws or /wss underlay, strip non-ws underlays,
          # and drop the dial-cache annotations (timestamps would churn the
          # committed file every run; the browser daemon re-probes anyway).
          # Mirrors `hoverfly discover --ws-only` / `is_ws_underlay` in
          # src/peers.rs.
          python3 - <<'EOF'
          import json

          seed = json.load(open("peers.seed.json"))
          out = {}
          for overlay, p in seed["peers"].items():
              ws = [u for u in p["underlays"] if "/ws" in u]
              if not ws:
                  continue
              out[overlay] = {
                  "overlay": p["overlay"],
                  "underlays": ws,
                  "eth_address": p.get("eth_address"),
                  "nonce": p.get("nonce"),
              }
          count = len(out)
          print(f"ws-only: kept {count} of {len(seed['peers'])} peers")
          # Sanity: don't replace the committed browser seed with a
          # degenerate one if the network round was light on ws peers.
          if count < 50:
              print(f"::warning::Only {count} ws peers (<50); keeping existing peers.ws.json.")
              raise SystemExit(0)
          with open("peers.ws.json", "w") as f:
              json.dump({"peers": out}, f, indent=2)
              f.write("\n")
          EOF

      - name: Commit refreshed peerlists
        run: |
          set -euo pipefail
          # If the discover step bailed early the temp file may still exist
          # and both peerlists are unchanged — `git diff` handles that.
          rm -f peers.seed.next.json
          if git diff --quiet -- peers.seed.json peers.ws.json; then
            echo "peerlists unchanged; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add peers.seed.json peers.ws.json
          git commit -m "chore(peers): refresh peers.seed.json + peers.ws.json [skip ci]"
          git push
