name: release

# Triggered when you publish a GitHub release (or pre-release) via the
# UI / API. The release itself — with auto-generated changelog notes —
# is created manually so GitHub's "Generate release notes" button can
# do its thing. This workflow only attaches platform binaries.
#
# Workflow:
#   1. Tag locally and push it:  git push origin v0.2.0
#   2. On GitHub, "Draft a new release" against the tag, click
#      "Generate release notes", review, then "Publish release".
#   3. This workflow fires, builds for each target, and uploads
#      `hoverfly-vX.Y.Z-<target>.tar.gz` + .sha256 to the release.
#
# Each tarball ships:
#   hoverfly-vX.Y.Z-<target>/
#     ├── hoverfly              (stripped binary)
#     ├── peers.seed.json      (curated cold-start peer list)
#     ├── README.md
#     └── LICENSE
#
# Each tarball is signed with a SLSA Build Provenance attestation
# (sigstore-backed). Verify a downloaded asset with:
#
#   gh attestation verify hoverfly-v0.2.0-x86_64-unknown-linux-gnu.tar.gz \
#     -R omnipin/hoverfly
#
# The wasm32 target goes to npm instead (job `publish-npm`): it's a
# browser cdylib, not a CLI binary. Built with nightly + build-std
# (forced by the +atomics rustflags in .cargo/config.toml), bound with
# wasm-bindgen, and published via npm OIDC trusted publishing — no
# NPM_TOKEN, provenance is automatic.
#
# First release only: publish by hand once to create the package, then
# add the trusted publisher (GitHub Actions, repo omnipin/hoverfly,
# workflow release.yml) under the npm package's settings.
#
# Every release after that publishes tokenlessly from this workflow.

on:
  release:
    types: [published, prereleased]

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
      # SLSA Build Provenance attestations via `actions/attest`.
      id-token: write
      attestations: write
      artifact-metadata: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            use-cross: false
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            use-cross: true
          - target: x86_64-apple-darwin
            # `macos-13` is the last GHA Intel runner. If/when it
            # retires, switch to `macos-latest` and build with
            # `--target x86_64-apple-darwin` cross from M-series.
            runner: macos-13
            use-cross: false
          - target: aarch64-apple-darwin
            runner: macos-latest
            use-cross: false
          # FreeBSD builds run inside a cross-rs container (no native
          # GHA runner exists, and only x86_64 has a maintained image).
          # NetBSD is dropped for now — we can't get the cross build
          # working yet.
          - target: x86_64-unknown-freebsd
            runner: ubuntu-latest
            use-cross: true

    steps:
      - uses: actions/checkout@v6
        with:
          # Check out the exact commit the release tag points at —
          # the default would be whatever default branch HEAD is at,
          # which can drift past the tagged commit.
          ref: ${{ github.event.release.tag_name }}

      - name: Verify Cargo.toml version matches release tag
        # Catches "tagged v0.2.0 but forgot to bump Cargo.toml" before
        # spending matrix-build time on stale artifacts.
        run: |
          tag="${{ github.event.release.tag_name }}"
          want="${tag#v}"
          got="$(awk -F'"' '/^version =/{print $2; exit}' Cargo.toml)"
          if [ "$want" != "$got" ]; then
            echo "::error::tag $tag implies Cargo.toml version $want, but Cargo.toml says $got"
            exit 1
          fi

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add ${{ matrix.target }}

      - name: Install cross
        if: matrix.use-cross
        # Pinned to v0.2.5 — newer releases have intermittently
        # broken CI in other projects (per ripgrep's pinning note).
        env:
          CROSS_VERSION: v0.2.5
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -fL "https://github.com/cross-rs/cross/releases/download/${CROSS_VERSION}/cross-x86_64-unknown-linux-musl.tar.gz" \
            | tar -xz -C "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - uses: Swatinem/rust-cache@v2.9.1
        with:
          # Per-target cache so an Apple Silicon rebuild doesn't
          # invalidate the Linux x86_64 cache.
          key: ${{ matrix.target }}
          # Persist cache even on job failure: a 1m 30s wasm cold
          # compile that fails at the post-build `wasm-bindgen` step
          # would otherwise drop the cache and force the next attempt
          # to recompile from scratch.
          cache-on-failure: true

      - name: Build release binary
        env:
          # Smaller, more portable binaries. LTO is on by default in
          # the `release` profile; this just makes binaries strip-friendly.
          CARGO_PROFILE_RELEASE_STRIP: none
        run: |
          if [ "${{ matrix.use-cross }}" = "true" ]; then
            cross build --release --locked --target ${{ matrix.target }}
          else
            cargo build --release --locked --target ${{ matrix.target }}
          fi

      - name: Strip binary
        # `strip` ships on every GHA runner image but only understands
        # the host's ELF flavour. For cross-built targets we run the
        # toolchain's strip from inside the cross docker image.
        run: |
          bin="target/${{ matrix.target }}/release/hoverfly"
          case "${{ matrix.target }}" in
            aarch64-unknown-linux-gnu)
              strip_bin=aarch64-linux-gnu-strip ;;
            x86_64-unknown-freebsd)
              strip_bin=x86_64-unknown-freebsd13-strip ;;
            *)
              strip "$bin"; exit 0 ;;
          esac
          docker run --rm -v "$PWD:/w" -w /w \
            "ghcr.io/cross-rs/${{ matrix.target }}:main" \
            "$strip_bin" "$bin"

      - name: Package tarball
        id: package
        run: |
          ver="${{ github.event.release.tag_name }}"
          name="hoverfly-${ver}-${{ matrix.target }}"
          stage="stage/${name}"
          mkdir -p "$stage"

          cp "target/${{ matrix.target }}/release/hoverfly" "$stage/"
          cp peers.seed.json README.md LICENSE "$stage/"

          tar -czf "${name}.tar.gz" -C stage "${name}"
          shasum -a 256 "${name}.tar.gz" > "${name}.tar.gz.sha256"
          ls -la "${name}.tar.gz"*

          echo "tarball=${name}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "sha256=${name}.tar.gz.sha256" >> "$GITHUB_OUTPUT"

      - name: Attest build provenance
        # SLSA Build Provenance: a sigstore-signed statement that this
        # exact binary was produced by this workflow at this commit.
        # Verifiable downstream with `gh attestation verify`.
        uses: actions/attest@v4
        with:
          subject-path: ${{ steps.package.outputs.tarball }}

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            --repo "${{ github.repository }}" \
            --clobber \
            "${{ steps.package.outputs.tarball }}" \
            "${{ steps.package.outputs.sha256 }}"

  publish-npm:
    name: npm (@omnipin/hoverfly)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write          # OIDC for npm trusted publishing (no token)
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      # Browser wasm is a cdylib built with nightly + build-std: the
      # +atomics rustflags in .cargo/config.toml force a std rebuild.
      - name: Install toolchain
        run: |
          rustup toolchain install nightly --profile minimal --component rust-src
          rustup target add wasm32-unknown-unknown --toolchain nightly

      - uses: Swatinem/rust-cache@v2.9.1
        with:
          key: wasm32-unknown-unknown
          # See note on the matrix cache step: a wasm compile that
          # fails at `wasm-bindgen` should still leave a warm cache
          # for the retry.
          cache-on-failure: true

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      # wasm-bindgen CLI must match the crate version in Cargo.lock.
      - name: Install wasm-bindgen
        run: |
          curl -fL https://github.com/wasm-bindgen/wasm-bindgen/releases/download/0.2.108/wasm-bindgen-0.2.108-x86_64-unknown-linux-musl.tar.gz \
            | tar -xz -C "$HOME/.cargo/bin" --strip-components=1 wasm-bindgen-0.2.108-x86_64-unknown-linux-musl/wasm-bindgen

      # --no-default-features drops the native-only CLI bins; --lib builds
      # the cdylib, then wasm-bindgen emits the ESM package into pkg/.
      - name: Build wasm package
        env:
          RUSTUP_TOOLCHAIN: nightly
        run: |
          cargo build --release --locked --target wasm32-unknown-unknown --no-default-features --lib
          wasm-bindgen --target web --out-dir pkg target/wasm32-unknown-unknown/release/hoverfly.wasm
          cp README.npm.md pkg/README.md

      - name: Publish to npm
        working-directory: pkg
        run: |
          ver="${{ github.event.release.tag_name }}"
          cat > package.json <<EOF
          {
            "name": "@omnipin/hoverfly",
            "version": "${ver#v}",
            "license": "MIT",
            "repository": { "type": "git", "url": "git+https://github.com/omnipin/hoverfly.git" },
            "type": "module",
            "main": "hoverfly.js",
            "types": "hoverfly.d.ts",
            "files": ["hoverfly_bg.wasm", "hoverfly.js", "hoverfly.d.ts", "snippets"]
          }
          EOF
          npm publish --access public
