name: bench

# Benchmark isheika daemon-mode upload throughput against bee mainnet
# from a GitHub-hosted runner. Manually triggered (workflow_dispatch)
# only — uploads cost real BZZ via the postage batch, and runner IPs
# rotate so peer warmup cost gets paid every run.
#
# Required repository secrets:
#   BENCH_BATCH    Postage batch ID (32-byte hex, no 0x prefix)
#   BENCH_KEY      Signer private key (32-byte hex, 0x prefix optional)
#   BENCH_NONCE    Vanity overlay nonce (32-byte hex, no 0x prefix)
#                  Generate locally with `isheika vanity-overlay
#                  --key <BENCH_KEY> --target-overlay <stable-peer-overlay>
#                  --target-po 10 --output overlay-nonce`, then
#                  `cat overlay-nonce`.

# Shared with `bench-direct` so the two never run concurrently —
# both walk the same hive gossip graph from the same runner IP space
# during their warm-up phase, and overlapping discover would skew
# each other's peer-table state and pool fill timing. We queue
# rather than cancel: every run costs real BZZ, no run should be
# silently dropped.
concurrency:
  group: bench-mainnet
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      file_size_mib:
        description: "Random upload size in MiB"
        required: false
        default: "5"
        type: string
      n_uploads:
        description: "Number of uploads to median (each costs real BZZ)"
        required: false
        default: "3"
        type: string
      pool_size:
        description: "Daemon --pool-size"
        required: false
        default: "256"
        type: string
      buffer_multiplier:
        description: "Daemon --buffer-multiplier (1, 2, or 4)"
        required: false
        default: "2"
        type: string
      use_random_nonce:
        description: "Use a freshly-generated random overlay nonce instead of BENCH_NONCE (A/B test the value of vanity-overlay optimization)"
        required: false
        default: false
        type: boolean

jobs:
  bench:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Disable incremental compilation in release mode. Combined with
      # Swatinem/rust-cache, this makes cargo trust the fingerprint
      # cache and skip recompiling unchanged source on cache hit —
      # workaround for the well-known "checkout updates mtimes,
      # cargo thinks source is newer than artifacts" CI rebuild bug.
      CARGO_INCREMENTAL: "0"

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install protoc
        # nectar-primitives / prost-build call `protoc` from their
        # build scripts. ubuntu-latest doesn't ship it by default.
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends protobuf-compiler
          protoc --version

      # Two-tier cache strategy:
      #
      # 1. `Swatinem/rust-cache` handles the standard Cargo paths
      #    (.cargo/{bin,registry/index,registry/cache,git/db} + the
      #    workspace target/{deps,build,...}). Prunes intermediates
      #    so the cache stays small, keys on Cargo.lock so partial
      #    dep updates still reuse most of the cache.
      #
      # 2. We additionally cache the final built binary keyed on a
      #    hash of every input that affects the build output:
      #    Cargo.{toml,lock}, the entire src/ tree, build.rs, and
      #    proto/ files. If hit, we skip `cargo build` entirely.
      #    This dodges the well-known mtime issue where actions/checkout
      #    rewrites file timestamps, making cargo think source is
      #    newer than cached artifacts and forcing a rebuild even
      #    though nothing actually changed.
      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2.9.1
        with:
          shared-key: bench-release
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Cache built binary
        id: bin-cache
        uses: actions/cache@v5
        with:
          path: target/release/isheika
          key: bin-${{ runner.os }}-${{ hashFiles('Cargo.toml', 'Cargo.lock', 'src/**/*.rs', 'build.rs', 'proto/**') }}

      - name: Build release binary
        if: steps.bin-cache.outputs.cache-hit != 'true'
        run: cargo build --release --bin isheika

      - name: Verify binary
        run: |
          ./target/release/isheika --version || true
          ./target/release/isheika --help | head -3

      - name: Validate secrets
        env:
          BENCH_BATCH: ${{ secrets.BENCH_BATCH }}
          BENCH_KEY: ${{ secrets.BENCH_KEY }}
          BENCH_NONCE: ${{ secrets.BENCH_NONCE }}
          USE_RANDOM_NONCE: ${{ inputs.use_random_nonce }}
        run: |
          missing=()
          [ -z "$BENCH_BATCH" ] && missing+=("BENCH_BATCH")
          [ -z "$BENCH_KEY" ]   && missing+=("BENCH_KEY")
          if [ "$USE_RANDOM_NONCE" != "true" ]; then
            [ -z "$BENCH_NONCE" ] && missing+=("BENCH_NONCE")
          fi
          if [ "${#missing[@]}" -gt 0 ]; then
            printf '::error::Missing required secret(s): %s\n' "${missing[*]}"
            exit 1
          fi
          # Don't echo the secrets — just confirm they parse.
          [ "${#BENCH_BATCH}" -ge 64 ] || { echo "::error::BENCH_BATCH too short"; exit 1; }
          [ "${#BENCH_KEY}"   -ge 64 ] || { echo "::error::BENCH_KEY too short";   exit 1; }
          if [ "$USE_RANDOM_NONCE" != "true" ]; then
            [ "${#BENCH_NONCE}" -ge 64 ] || { echo "::error::BENCH_NONCE too short"; exit 1; }
          fi
          echo "All secrets present and within expected length."

      - name: Write overlay nonce
        env:
          BENCH_NONCE: ${{ secrets.BENCH_NONCE }}
          USE_RANDOM_NONCE: ${{ inputs.use_random_nonce }}
        run: |
          if [ "$USE_RANDOM_NONCE" = "true" ]; then
            # A/B test: skip vanity optimization, let the daemon generate
            # a fresh random nonce on first run. We just don't create the
            # overlay-nonce file; the daemon will create one itself.
            echo "use_random_nonce=true — daemon will generate a fresh random nonce"
            rm -f overlay-nonce
          else
            # Strip optional 0x prefix and any whitespace.
            NONCE_HEX="${BENCH_NONCE#0x}"
            NONCE_HEX="$(echo -n "$NONCE_HEX" | tr -d '[:space:]')"
            if [ "${#NONCE_HEX}" -ne 64 ]; then
              echo "::error::BENCH_NONCE must be 32 bytes (64 hex chars), got ${#NONCE_HEX}"
              exit 1
            fi
            printf "%s" "$NONCE_HEX" > overlay-nonce
            echo "wrote overlay-nonce ($(wc -c < overlay-nonce) bytes)"
          fi

      - name: Seed peers.json from committed seed
        # Bee 2.8.0 nodes drop the v14 substream id our older code
        # used, so the official mainnet bootnodes return 0 peers on
        # discover from a cold runner. peers.seed.json (706 peers
        # across 706 unique /32 IPs, harvested from a v15 daemon)
        # is the cold-start candidate set that bypasses discover.
        run: |
          if [ ! -f peers.seed.json ]; then
            echo "::error::peers.seed.json missing from checkout"
            exit 1
          fi
          cp peers.seed.json peers.json
          PEER_COUNT=$(python3 -c "import json; print(len(json.load(open('peers.json'))['peers']))")
          echo "seeded peers.json with $PEER_COUNT peers"

      - name: Start daemon
        # peers.seed.json (~794 peers across ~794 unique /32 IPs from
        # a v15 hive harvest) is the primary cold-start source.
        # /dnsaddr/mainnet.ethswarm.org resolves to the current
        # Swarm Foundation bootnodes; with v15 handshake support
        # those accept us again (they were rejecting v14 dialers).
        #
        # bee 2.8.0 (May 2026) raised handshake to 15.0.0 and hive
        # to 2.0.0. isheika negotiates v15 first, falls back to v14
        # on UnsupportedProtocol so it interoperates with both 2.7.x
        # and 2.8.0 peers across the network.
        env:
          BENCH_KEY: ${{ secrets.BENCH_KEY }}
        run: |
          rm -f /tmp/isheika.sock
          nohup ./target/release/isheika \
            --buffer-multiplier ${{ inputs.buffer_multiplier }} \
            daemon \
            --socket /tmp/isheika.sock \
            --pool-size ${{ inputs.pool_size }} \
            --listen /ip4/0.0.0.0/tcp/1635 \
            --identity "$BENCH_KEY" \
            --discover-rounds 3 \
            -d \
            > /tmp/daemon.log 2>&1 &
          DAEMON_PID=$!
          echo "DAEMON_PID=$DAEMON_PID" >> "$GITHUB_ENV"
          echo "started daemon pid $DAEMON_PID"

      - name: Wait for warm pool
        # Daemon-side discover + pool fill from cold takes
        # ~80s on a VPS for pool=256; GH runners are slower with
        # smaller bandwidth, so cap wait at 8 min.
        run: |
          for i in $(seq 1 96); do
            if grep -q "warm pool" /tmp/daemon.log 2>/dev/null; then
              echo "pool warm after ${i}x5s waits"
              grep "pool fill: done" /tmp/daemon.log | tail -1
              exit 0
            fi
            sleep 5
          done
          echo "::warning::pool did not warm in 8 min; proceeding anyway"
          tail -50 /tmp/daemon.log

      - name: Run benchmark uploads
        env:
          BENCH_BATCH: ${{ secrets.BENCH_BATCH }}
          BENCH_KEY: ${{ secrets.BENCH_KEY }}
        run: |
          : > /tmp/bench.results
          for i in $(seq 1 ${{ inputs.n_uploads }}); do
            rm -f /tmp/bench-${{ inputs.file_size_mib }}mib.bin
            dd if=/dev/urandom \
               of=/tmp/bench-${{ inputs.file_size_mib }}mib.bin \
               bs=1M count=${{ inputs.file_size_mib }} status=none

            echo "=== Run $i ==="
            ./target/release/isheika upload \
              --daemon /tmp/isheika.sock \
              --batch "$BENCH_BATCH" \
              --key "$BENCH_KEY" \
              /tmp/bench-${{ inputs.file_size_mib }}mib.bin 2>&1 \
              | tee -a /tmp/bench.results \
              | grep -E '^upload:|^uploaded' || true

            # Brief pause so back-to-back uploads don't share warm caches.
            sleep 3
          done

      - name: Summarize throughput
        run: |
          echo "## Benchmark summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- file size: ${{ inputs.file_size_mib }} MiB" >> "$GITHUB_STEP_SUMMARY"
          echo "- n uploads: ${{ inputs.n_uploads }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- pool size: ${{ inputs.pool_size }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- buffer multiplier: ${{ inputs.buffer_multiplier }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- nonce mode: ${{ inputs.use_random_nonce == true && 'random (A/B baseline)' || 'vanity (BENCH_NONCE)' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| run | seconds | throughput |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----|---------|------------|" >> "$GITHUB_STEP_SUMMARY"

          # Parse rows of the form:
          #   upload: 5242880 bytes in 5.04s = 1016.60 KiB/s
          # OR the MiB/s variant.
          # Emit median, best, worst at the end.
          python3 - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import re
          rates = []
          row_idx = 0
          with open("/tmp/bench.results") as f:
              for line in f:
                  m = re.search(r'upload: \d+ bytes in ([\d.]+)s = ([\d.]+) (KiB|MiB)/s', line)
                  if not m: continue
                  row_idx += 1
                  secs, val, unit = float(m.group(1)), float(m.group(2)), m.group(3)
                  kibs = val if unit == "KiB" else val * 1024.0
                  rates.append(kibs)
                  print(f"| {row_idx} | {secs:.2f} | {val:.2f} {unit}/s |")
          if rates:
              rs = sorted(rates)
              med = rs[len(rs)//2] if len(rs)%2==1 else (rs[len(rs)//2-1]+rs[len(rs)//2])/2
              print()
              print(f"**Median: {med:.2f} KiB/s**")
              print(f"Best: {max(rates):.2f} KiB/s")
              print(f"Worst: {min(rates):.2f} KiB/s")
          else:
              print()
              print("**No successful uploads parsed from results.**")
          PY

          cat "$GITHUB_STEP_SUMMARY"

      - name: Stop daemon and capture diagnostics
        if: always()
        run: |
          if [ -n "${DAEMON_PID:-}" ]; then
            kill -INT "$DAEMON_PID" 2>/dev/null || true
            sleep 1
            kill -9 "$DAEMON_PID" 2>/dev/null || true
          fi
          # Last few hundred lines of daemon log into the step summary
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Last daemon log lines" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -100 /tmp/daemon.log >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload daemon log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daemon-log-${{ github.run_id }}
          path: |
            /tmp/daemon.log
            /tmp/bench.results
            peers.json
          retention-days: 7
